# TEMPLATE — do not commit a filled-in copy.
#
# Two ways to create the real Secret:
#
#  A) Imperative (recommended — keeps secrets out of git):
#       kubectl create secret generic kl-governance-secrets \
#         --namespace kl-governance \
#         --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#         --from-literal=MSTEAMS_APP_ID='<CLIENT_ID from Teams CLI output>' \
#         --from-literal=MSTEAMS_APP_PASSWORD='<CLIENT_SECRET from Teams CLI output>' \
#         --from-literal=MSTEAMS_TENANT_ID='<TENANT_ID / directory (tenant) id>' \
#         --from-literal=SPLUNK_MCP_COMMAND='npx' \
#         --from-literal=SPLUNK_MCP_ARGS='-y mcp-remote https://<splunk-mcp-host>:8089/services/mcp --header "Authorization: Bearer <token>"'
#
#  B) Copy this file to secret.yaml (gitignored), fill in stringData, then:
#       kubectl apply -f k8s/secret.yaml
#
# Notes:
#   - MSTEAMS_TENANT_ID lives here (grouped with the other Teams values) so that
#     deployment.yaml stays free of env-specific placeholders. It's not really a
#     credential, but the Secret is the convenient out-of-band store.
#   - SPLUNK_MCP_* are the same values as the triage agent's .env, so the
#     splunk-triage MCP works identically from the chat bot
apiVersion: v1
kind: Secret
metadata:
  name: kl-governance-secrets
  namespace: kl-governance
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  MSTEAMS_APP_ID: "REPLACE_ME"
  MSTEAMS_APP_PASSWORD: "REPLACE_ME"
  MSTEAMS_TENANT_ID: "REPLACE_ME"
  SPLUNK_MCP_COMMAND: "npx"
  SPLUNK_MCP_ARGS: '-y mcp-remote https://splunk-mcp.example.com:8089/services/mcp --header "Authorization: Bearer REPLACE_ME"'
